# Native in-pod HTTPS (S3Proxy secure-endpoint) with the keystore and password
# supplied via a pre-existing Secret (the production / cert-manager path).
config:
  auth:
    type: "aws-v4"
    identity: "testkey"
    secret: "testsecret"
  tls:
    enabled: true
    keystore:
      existingSecret: "my-tls"
      secretKey: "keystore.p12"
    keystorePassword:
      existingSecret: "my-tls"
      secretKey: "keystore-password"
  backends:
    filesystem:
      enabled: true

# Azurite — Azure Blob Storage emulator (official Microsoft image) for the
# s3proxy functional test. Uses Azurite's well-known devstoreaccount1 account,
# which matches ci/functional/values/azureblob.yaml.
# Ephemeral — the whole kind cluster is discarded after the test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite:3.34.0
          args:
            - azurite-blob
            - --blobHost
            - 0.0.0.0
            - --blobPort
            - "10000"
            # Accept any storage API version. The assertion's `az` CLI on the CI
            # runner sends a newer x-ms-version than this Azurite image knows,
            # which it would otherwise reject with InvalidHeaderValue.
            - --skipApiVersionCheck
          ports:
            - name: blob
              containerPort: 10000
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000

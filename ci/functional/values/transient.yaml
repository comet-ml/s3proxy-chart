# Functional-test values: transient (in-memory) backend, no persistence/mock.
config:
  auth:
    type: aws-v4
    identity: test-access-key
    secret: test-secret-key
  backends:
    filesystem:
      enabled: false
    transient:
      enabled: true
      nio2: true
persistence:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 256Mi
